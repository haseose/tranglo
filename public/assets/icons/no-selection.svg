<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Chart background panel -->
  <rect x="10" y="30" width="100" height="70" rx="8" fill="#e2e8f0"/>
  <!-- Dashed empty chart lines -->
  <line x1="22" y1="80" x2="98" y2="80" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="22" y1="65" x2="98" y2="65" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="22" y1="50" x2="98" y2="50" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4 3"/>
  <!-- Magnifying glass circle -->
  <circle cx="60" cy="48" r="18" fill="#f8fafc" stroke="#94a3b8" stroke-width="2.5"/>
  <!-- Question mark inside glass -->
  <text x="60" y="54" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#94a3b8">?</text>
  <!-- Magnifying glass handle -->
  <line x1="73" y1="61" x2="84" y2="72" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
  <!-- Label below -->
  <rect x="28" y="92" width="64" height="6" rx="3" fill="#cbd5e1"/>
</svg>
