<main class="dashboard" aria-label="Currency Exchange Rate Dashboard">

  <header class="dashboard-header">
    <div class="header-title-group">
      <h1 class="dashboard-title">
        <span aria-hidden="true">💱</span>
        Exchange Rates
      </h1>

      <div
        class="connection-badge"
        [class.connection-badge--live]="isConnected()"
        [class.connection-badge--offline]="!isConnected()"
        role="status"
        [attr.aria-label]="isConnected() ? 'Connection status: Live' : 'Connection status: Offline'"
      >
        <span class="connection-dot" aria-hidden="true"></span>
        <span class="connection-label">{{ isConnected() ? 'Live' : 'Offline' }}</span>
      </div>
    </div>

    <div class="header-controls">
      @if (lastUpdated()) {
        <p class="last-updated">
          <span class="sr-only">Last updated:</span>
          <time>{{ lastUpdated() }}</time>
        </p>
      }

      <div class="base-currency-control">
        <mat-form-field appearance="outline" class="base-currency-field">
          <mat-label>Base Currency</mat-label>
          <mat-select
            [value]="baseCurrency()"
            (selectionChange)="onBaseCurrencyChange($event.value)"
            [attr.aria-label]="'Select base currency, currently ' + baseCurrency()"
          >
            @for (currency of popularCurrencies; track currency.code) {
              <mat-option [value]="currency.code">
                {{ currency.code }} – {{ currency.name }}
              </mat-option>
            }
          </mat-select>
        </mat-form-field>
      </div>
    </div>
  </header>

  <div class="dashboard-card">

    <app-rate-search-filter
      (searchChange)="onSearchChange($event)"
      (filterChange)="onFilterChange($event)"
    />

    <app-exchange-rate-table
      [baseCurrency]="baseCurrency()"
      [searchQuery]="searchQuery()"
      [filterCurrency]="filterCurrency()"
    />
  </div>

</main>
