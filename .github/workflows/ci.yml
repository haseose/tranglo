name: CI/CD Pipeline

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Lint
  # ─────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

  # ─────────────────────────────────────────────
  # Job 2: Unit Tests
  # ─────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:ci

  # ─────────────────────────────────────────────
  # Job 3: Deploy to Vercel
  #
  # master → waits for manual approval (via the
  #          "production" GitHub Environment), then
  #          deploys to Vercel production.
  # develop / PRs → deploys to Vercel preview
  #                 immediately (no approval gate).
  #
  # GitHub Environment setup (one-time):
  #   Repo → Settings → Environments → New environment
  #   Name: production
  #   ✓ Required reviewers → add yourself
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: test

    # Approval gate: only the production branch uses the
    # protected environment; preview deployments skip it.
    environment:
      name: ${{ github.ref == 'refs/heads/master' && 'production' || 'preview' }}
      url: ${{ steps.deploy.outputs.url }}

    # Centralised Vercel CLI parameters — avoids repeating
    # secrets and flags in every step.
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      EXCHANGE_RATE_API_KEY: ${{ secrets.EXCHANGE_RATE_API_KEY }}
      IS_PRODUCTION: ${{ github.ref == 'refs/heads/master' && github.event_name == 'push' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel project settings
        run: |
          npx vercel pull --yes \
            --environment=${{ env.IS_PRODUCTION == 'true' && 'production' || 'preview' }} \
            --token=${{ env.VERCEL_TOKEN }}

      - name: Build via Vercel CLI
        run: |
          npx vercel build \
            ${{ env.IS_PRODUCTION == 'true' && '--prod' || '' }} \
            --token=${{ env.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          URL=$(npx vercel deploy --prebuilt \
            ${{ env.IS_PRODUCTION == 'true' && '--prod' || '' }} \
            --token=${{ env.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "✅ Deployed to $URL"

